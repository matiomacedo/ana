site_name: Ana
site_description: A fully local AI coding agent — runs on your machine via Ollama.
site_url: https://matiomacedo.github.io/ana/
repo_url: https://github.com/matiomacedo/ana
repo_name: matiomacedo/ana
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Get started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
  - Usage:
      - CLI reference: usage/cli-reference.md
      - Interactive mode: usage/interactive-mode.md
      - Headless mode: usage/headless.md
      - Sessions & rewind: usage/sessions.md
  - Configuration:
      - Settings & env vars: configuration/settings.md
      - Models & presets: configuration/models.md
      - Permission modes: configuration/permissions.md
  - Features:
      - Memory: features/memory.md
      - Tools: features/tools.md
      - Verification: features/verification.md
      - Subagents & background agents: features/subagents.md
      - Watch & CI review: features/watch.md
  - Extend:
      - MCP servers: extend/mcp.md
      - Plugins: extend/plugins.md
      - Skills: extend/skills.md
      - Hooks & custom commands: extend/hooks.md
  - Reference:
      - Architecture: reference/architecture.md
      - Security model: reference/security.md
      - Troubleshooting: reference/troubleshooting.md
